<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Sweepstake</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#fff;font-family:Georgia,'Times New Roman',serif;min-height:100vh;padding:24px 16px 48px}
.page{max-width:480px;margin:0 auto}
.title{text-align:center;font-size:clamp(24px,7vw,36px);font-weight:900;letter-spacing:.12em;margin:8px 0 4px;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:#888;font-size:13px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:28px}
.label{display:block;color:#aaa;font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;margin-top:4px}
input[type=text]{display:block;width:100%;background:#111;border:1px solid #333;border-radius:8px;padding:10px 14px;color:#fff;font-size:15px;margin-bottom:8px;outline:none;font-family:inherit}
input[type=text]:focus{border-color:#FFD700}
.btn-primary{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-weight:900;font-size:17px;letter-spacing:.1em;border:none;border-radius:12px;cursor:pointer;font-family:inherit;text-transform:uppercase;margin-top:8px}
.btn-ghost{display:block;width:100%;padding:12px;background:transparent;border:1px solid #222;color:#555;border-radius:12px;cursor:pointer;font-size:14px;font-family:inherit;margin-top:10px}
.info-box{background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:14px 16px;margin-bottom:22px;color:#888;font-size:13px;line-height:1.7}
.info-box strong{color:#FFD700}
.num-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.num-btn{width:44px;height:44px;border-radius:8px;border:1px solid #333;background:#111;color:#666;font-size:16px;cursor:pointer;font-family:inherit}
.num-btn.active{background:#FFD700;color:#000;border-color:#FFD700;font-weight:bold}
.player-btn{display:flex;align-items:center;gap:14px;background:#111;border-radius:12px;padding:15px 18px;cursor:pointer;text-align:left;font-family:inherit;width:100%;margin-bottom:10px;border:1px solid transparent}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0}
.tier-slot{border-radius:14px;padding:16px 18px;margin-bottom:12px;transition:border-color .3s}
.tier-tag{display:inline-block;font-size:11px;border-radius:10px;padding:2px 10px;margin-bottom:12px;letter-spacing:.05em}
.draw-btn{width:100%;border-radius:10px;padding:14px;cursor:pointer;font-size:15px;font-family:inherit;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:10px;border-style:dashed}
.team-revealed{display:flex;align-items:center;gap:12px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.locked-msg{color:#2a2a2a;font-size:13px;display:flex;align-items:center;gap:8px}
.spinning{font-size:36px;animation:spin .5s linear infinite;display:inline-block}
.well-done{background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:18px;text-align:center;margin-bottom:16px;animation:fadeIn .5s ease}
.qr-wrap{background:#fff;border-radius:16px;padding:16px;display:inline-block;margin:0 auto}
#qr-canvas{display:block}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const TEAMS={high:[{name:"Spain",flag:"🇪🇸",odds:"+450"},{name:"France",flag:"🇫🇷",odds:"+475"},{name:"England",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",odds:"+650"},{name:"Brazil",flag:"🇧🇷",odds:"+850"},{name:"Argentina",flag:"🇦🇷",odds:"+900"},{name:"Portugal",flag:"🇵🇹",odds:"+900"},{name:"Germany",flag:"🇩🇪",odds:"14-1"},{name:"Netherlands",flag:"🇳🇱",odds:"20-1"},{name:"Norway",flag:"🇳🇴",odds:"35-1"},{name:"Colombia",flag:"🇨🇴",odds:"40-1"},{name:"Belgium",flag:"🇧🇪",odds:"40-1"},{name:"Morocco",flag:"🇲🇦",odds:"40-1"},{name:"Uruguay",flag:"🇺🇾",odds:"65-1"},{name:"USA",flag:"🇺🇸",odds:"60-1"},{name:"Japan",flag:"🇯🇵",odds:"60-1"},{name:"Türkiye",flag:"🇹🇷",odds:"80-1"}],medium:[{name:"Mexico",flag:"🇲🇽",odds:"100-1"},{name:"Switzerland",flag:"🇨🇭",odds:"100-1"},{name:"Sweden",flag:"🇸🇪",odds:"100-1"},{name:"Senegal",flag:"🇸🇳",odds:"100-1"},{name:"Ecuador",flag:"🇪🇨",odds:"125-1"},{name:"South Korea",flag:"🇰🇷",odds:"125-1"},{name:"Croatia",flag:"🇭🇷",odds:"125-1"},{name:"Austria",flag:"🇦🇹",odds:"125-1"},{name:"Ivory Coast",flag:"🇨🇮",odds:"150-1"},{name:"Canada",flag:"🇨🇦",odds:"200-1"},{name:"Australia",flag:"🇦🇺",odds:"200-1"},{name:"Egypt",flag:"🇪🇬",odds:"200-1"},{name:"Czechia",flag:"🇨🇿",odds:"200-1"},{name:"Scotland",flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",odds:"200-1"},{name:"Algeria",flag:"🇩🇿",odds:"250-1"},{name:"Iran",flag:"🇮🇷",odds:"250-1"}],low:[{name:"Paraguay",flag:"🇵🇾",odds:"300-1"},{name:"Ghana",flag:"🇬🇭",odds:"300-1"},{name:"Tunisia",flag:"🇹🇳",odds:"300-1"},{name:"Bosnia & Herz.",flag:"🇧🇦",odds:"350-1"},{name:"DR Congo",flag:"🇨🇩",odds:"350-1"},{name:"Saudi Arabia",flag:"🇸🇦",odds:"400-1"},{name:"South Africa",flag:"🇿🇦",odds:"400-1"},{name:"Panama",flag:"🇵🇦",odds:"500-1"},{name:"Iraq",flag:"🇮🇶",odds:"500-1"},{name:"Uzbekistan",flag:"🇺🇿",odds:"500-1"},{name:"Jordan",flag:"🇯🇴",odds:"500-1"},{name:"Qatar",flag:"🇶🇦",odds:"750-1"},{name:"New Zealand",flag:"🇳🇿",odds:"750-1"},{name:"Cabo Verde",flag:"🇨🇻",odds:"1000-1"},{name:"Haiti",flag:"🇭🇹",odds:"1000-1"},{name:"Curaçao",flag:"🇨🇼",odds:"1500-1"}]};
const TIER_CONFIG={high:{label:"🏆 High Chance",color:"#FFD700",bg:"#1a1400",border:"#FFD700"},medium:{label:"⚽ Medium Chance",color:"#60CFFF",bg:"#001a26",border:"#60CFFF"},low:{label:"🎲 Low Chance",color:"#FF8C42",bg:"#1a0d00",border:"#FF8C42"}};
const TIERS=["high","medium","low"];
const PC=["#FF6B6B","#4ECDC4","#45B7D1","#FED766","#C7CEEA"];

// ── State ─────────────────────────────────────────────────────────────────
let state={phase:"setup",numPlayers:5,playerNames:["Katie","Cara","Lu","Dave","Mum"],picks:{},myIdx:null,myDrawn:{},animating:null};

// ── Helpers ───────────────────────────────────────────────────────────────
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function getTeamInfo(n){for(const t of Object.values(TEAMS)){const f=t.find(x=>x.name===n);if(f)return f}return null}
function getTeamTier(n){for(const[tier,t]of Object.entries(TEAMS)){if(t.find(x=>x.name===n))return tier}return null}
function getPlayerTeams(picks,idx){const r={high:null,medium:null,low:null};for(const[n,i]of Object.entries(picks)){if(i===idx){const t=getTeamTier(n);if(t)r[t]=n}}return r}
function ini(n,i){return(n||`P${i+1}`).slice(0,2).toUpperCase()}

// ── Actions ───────────────────────────────────────────────────────────────
function setNum(n){state.numPlayers=n;while(state.playerNames.length<n)state.playerNames.push("");render()}
function updateName(i,v){state.playerNames[i]=v}

function runDraw(){
  const names=state.playerNames.slice(0,state.numPlayers).map((n,i)=>n||`Player ${i+1}`);
  state.playerNames=names;
  const sh={high:shuffle(TEAMS.high),medium:shuffle(TEAMS.medium),low:shuffle(TEAMS.low)};
  const picks={};
  TIERS.forEach(tier=>{const pool=[...sh[tier]];names.forEach((_,pi)=>{const t=pool.shift();if(t)picks[t.name]=pi})});
  state.picks=picks;
  state.phase="qr";
  render();
}

function selectPlayer(i){state.myIdx=i;state.myDrawn={};state.animating=null;state.phase="draw";render()}
function drawTier(tier){
  if(state.myDrawn[tier]||state.animating)return;
  const team=getPlayerTeams(state.picks,state.myIdx)[tier];
  if(!team)return;
  state.animating=tier;render();
  setTimeout(()=>{state.myDrawn[tier]=team;state.animating=null;render()},700);
}
function goBack(){state.phase="who";render()}
function restart(){state={phase:"setup",numPlayers:5,playerNames:["","","","",""],picks:{},myIdx:null,myDrawn:{},animating:null};render()}

// ── Load from hash (when someone scans QR) ────────────────────────────────
function tryLoadHash(){
  const hash=window.location.hash.slice(1);
  if(!hash)return false;
  try{
    const d=JSON.parse(decodeURIComponent(escape(atob(hash))));
    if(d&&d.p&&d.k){
      state.playerNames=d.p;state.numPlayers=d.p.length;state.picks=d.k;state.phase="who";return true;
    }
  }catch(e){}
  return false;
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  switch(state.phase){
    case"setup": root.innerHTML=renderSetup();break;
    case"qr":    root.innerHTML=renderQR();showQR();break;
    case"who":   root.innerHTML=renderWho();break;
    case"draw":  root.innerHTML=renderDraw();break;
  }
}

// ── Setup ─────────────────────────────────────────────────────────────────
function renderSetup(){
  const nums=[2,3,4,5,6,7,8].map(n=>`<button class="num-btn${state.numPlayers===n?' active':''}" onclick="setNum(${n})">${n}</button>`).join('');
  const inputs=Array.from({length:state.numPlayers},(_,i)=>`<input type="text" id="name-${i}" value="${state.playerNames[i]||''}" placeholder="Player ${i+1}" style="border-color:${PC[i%PC.length]}55" oninput="updateName(${i},this.value)">`).join('');
  return`<div class="page">
    <div style="font-size:52px;text-align:center;margin-bottom:4px">🏆</div>
    <h1 class="title">WORLD CUP 2026</h1>
    <p class="subtitle">Family Sweepstake</p>
    <span class="label">Number of players</span>
    <div class="num-row">${nums}</div>
    <span class="label">Player names</span>
    ${inputs}
    <div class="info-box" style="margin-top:16px">Teams are drawn randomly and kept <strong>secret</strong>. You'll get a QR code — everyone scans it with their phone camera, picks their name, and draws their teams.</div>
    <button class="btn-primary" onclick="runDraw()">RUN THE DRAW 🎲</button>
  </div>`;
}

// ── QR screen ─────────────────────────────────────────────────────────────
function buildShareUrl(){
  const payload=JSON.stringify({p:state.playerNames,k:state.picks});
  const encoded=btoa(unescape(encodeURIComponent(payload)));
  const base='https://katiek96.github.io/World-Cup-Sweepstake-/worldcup-sweepstake.html';
  return base+'#'+encoded;
}

function renderQR(){
  return`<div class="page">
    <div style="font-size:48px;text-align:center">🎉</div>
    <h1 class="title">DRAW COMPLETE</h1>
    <p class="subtitle">All teams assigned secretly</p>
    <div style="background:#111;border:1px solid #222;border-radius:16px;padding:22px;margin-bottom:16px;text-align:center">
      <p style="font-weight:bold;font-size:16px;margin-bottom:6px">📱 Everyone scan this QR code</p>
      <p style="color:#666;font-size:13px;line-height:1.6;margin-bottom:18px">Open your phone camera, point at the code, and tap the link. Pick your name then draw your teams.</p>
      <div style="display:flex;justify-content:center;margin-bottom:14px">
        <div class="qr-wrap"><div id="qr-canvas"></div></div>
      </div>
      <p style="color:#444;font-size:11px">Works with any phone camera — no app needed</p>
    </div>
    <div style="background:#0f0f0f;border:1px solid #1a1a1a;border-radius:12px;padding:16px;margin-bottom:14px">
      <p class="label" style="margin-bottom:10px">Players in this draw</p>
      ${state.playerNames.map((n,i)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div class="avatar" style="width:28px;height:28px;font-size:10px;background:${PC[i%PC.length]}22;border:1px solid ${PC[i%PC.length]}66;color:${PC[i%PC.length]}">${ini(n,i)}</div><span style="color:#aaa;font-size:14px">${n}</span><span style="margin-left:auto;color:#333;font-size:12px">3 teams ✓</span></div>`).join('')}
    </div>
    <button class="btn-ghost" onclick="restart()">↩ Start New Draw</button>
  </div>`;
}

function showQR(){
  const url=buildShareUrl();
  const el=document.getElementById('qr-canvas');
  if(!el)return;
  new QRCode(el,{text:url,width:220,height:220,colorDark:"#000",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});
}

// ── Who are you ───────────────────────────────────────────────────────────
function renderWho(){
  const btns=state.playerNames.map((n,i)=>{const c=PC[i%PC.length];return`<button class="player-btn" style="border:1px solid ${c}44" onclick="selectPlayer(${i})"><div class="avatar" style="width:40px;height:40px;font-size:13px;background:${c}22;border:2px solid ${c}88;color:${c}">${ini(n,i)}</div><div style="flex:1"><div style="color:#fff;font-weight:bold;font-size:16px">${n}</div><div style="color:#555;font-size:12px;margin-top:2px">Draw your teams →</div></div><span style="color:${c};font-size:18px">→</span></button>`;}).join('');
  return`<div class="page"><div style="font-size:44px;text-align:center;margin-bottom:8px">👋</div><h1 class="title">WORLD CUP 2026</h1><p class="subtitle">Who are you?</p><p style="color:#555;font-size:13px;text-align:center;margin-bottom:24px">Select your name to draw your teams</p>${btns}</div>`;
}

// ── Personal draw ─────────────────────────────────────────────────────────
function renderDraw(){
  const idx=state.myIdx,name=state.playerNames[idx],color=PC[idx%PC.length];
  const allDrawn=TIERS.every(t=>state.myDrawn[t]),nextTier=TIERS.find(t=>!state.myDrawn[t]);
  const slots=TIERS.map(tier=>{
    const cfg=TIER_CONFIG[tier],drawnName=state.myDrawn[tier],team=drawnName?getTeamInfo(drawnName):null;
    const isAnim=state.animating===tier,isNext=tier===nextTier&&!allDrawn,isLocked=!drawnName&&!isNext&&!isAnim;
    const bg=drawnName?cfg.bg:"#0f0f0f",bc=drawnName?cfg.border:isNext?cfg.border+"66":"#1a1a1a",tc=(drawnName||isNext)?cfg.color:"#333";
    let inner="";
    if(team&&!isAnim)inner=`<div class="team-revealed"><span style="font-size:36px">${team.flag}</span><div><div style="font-weight:900;font-size:20px">${team.name}</div><div style="color:#555;font-size:12px;margin-top:2px">Odds: ${team.odds}</div></div></div>`;
    else if(isAnim)inner=`<div style="display:flex;align-items:center;gap:12px;font-weight:bold;font-size:16px;color:${cfg.color}"><span class="spinning">⚽</span> Drawing…</div>`;
    else if(isNext)inner=`<button class="draw-btn" style="background:linear-gradient(135deg,${cfg.color}22,${cfg.color}11);border-color:${cfg.border};color:${cfg.color}" onclick="drawTier('${tier}')"><span style="font-size:22px">🎱</span> Draw my ${tier} chance team</button>`;
    else inner=`<div class="locked-msg">🔒 Draw previous categories first</div>`;
    return`<div class="tier-slot" style="background:${bg};border:1px solid ${bc}"><div class="tier-tag" style="border:1px solid ${cfg.color}44;color:${tc}">${cfg.label}</div>${inner}</div>`;
  }).join('');
  const wd=allDrawn?`<div class="well-done"><div style="font-size:32px;margin-bottom:8px">🎉</div><p style="font-weight:bold;font-size:16px;margin-bottom:4px">Good luck ${name}!</p><p style="color:#555;font-size:13px">The World Cup kicks off June 11</p></div>`:"";
  return`<div class="page"><div style="text-align:center;margin-bottom:24px"><div class="avatar" style="width:52px;height:52px;margin:0 auto 12px;background:${color}22;border:2px solid ${color};font-size:16px;font-weight:bold;color:${color}">${ini(name,idx)}</div><h2 class="title" style="font-size:clamp(20px,5vw,30px)">${name}</h2><p style="color:#555;font-size:13px;margin-top:4px;letter-spacing:.1em;text-transform:uppercase">${allDrawn?"Your teams are set! ⚽":"Draw your teams one by one"}</p></div>${slots}${wd}<button class="btn-ghost" onclick="goBack()">← Back to player list</button></div>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────
window.setNum=setNum;window.updateName=updateName;window.runDraw=runDraw;
window.selectPlayer=selectPlayer;window.drawTier=drawTier;window.goBack=goBack;window.restart=restart;

if(!tryLoadHash())render();
else render();
</script>
</body>
</html>
